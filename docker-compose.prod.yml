services:
  creator-intelligence-app:
    build: .
    container_name: creator-intelligence-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOCAL_PRIVATE_MODE=true
      - SECURE_HEADERS_ENABLED=true
      - API_AUTH_ENABLED=true
    command:
      [
        "uvicorn",
        "creator_intelligence_app.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
        "--proxy-headers"
      ]
    volumes:
      - app-data:/workspace/creator_intelligence_app/data
      - ./knowledge-graph.json:/workspace/knowledge-graph.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app-data:
